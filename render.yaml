services:
  - type: web
    name: portfolio
    runtime: python-3.11
    buildCommand: pip install -r portfolio_backend/requirements.txt && cd portfolio_backend && python migrate.py
    startCommand: cd portfolio_backend && python migrate.py && uvicorn main:app --host 0.0.0.0 --port 8000
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
