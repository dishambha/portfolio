# Fly.io configuration
app = "portfolio-dishambha"
primary_region = "iad"

[build]
dockerfile = "Dockerfile"

[env]
PYTHONUNBUFFERED = "1"

[[services]]
internal_port = 8000
processes = ["app"]

  [services.http_checks]
  enabled = true
  grace_period = "5s"
  interval = "10s"
  timeout = "5s"
  path = "/health"
